name: Stacktrace
options:
  bundleIdPrefix: io.github.wpoortman
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_TESTABILITY: YES
    CODE_SIGN_STYLE: Automatic
    # Set your Apple Team ID here for signed / App Store builds:
    # DEVELOPMENT_TEAM: ABCDE12345
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
    INFOPLIST_KEY_NSCalendarsUsageDescription: "Stacktrace reads your calendar so you can reflect on the day's meetings."
    INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Stacktrace reads your calendar so you can reflect on the day's meetings."
targets:
  Stacktrace:
    type: application
    platform: macOS
    sources:
      - path: Stacktrace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.wpoortman.stacktrace
        PRODUCT_NAME: Stacktrace
        CODE_SIGN_ENTITLEMENTS: Stacktrace/Stacktrace.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Stacktrace
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Willem Poortman"
  StacktraceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: StacktraceTests
    dependencies:
      - target: Stacktrace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.wpoortman.stacktrace.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Stacktrace:
    build:
      targets:
        Stacktrace: all
        StacktraceTests: [test]
    test:
      targets:
        - StacktraceTests
